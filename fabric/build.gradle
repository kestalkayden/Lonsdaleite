plugins {
    id 'net.fabricmc.fabric-loom' version "${loom_version}"
    id 'maven-publish'
}

base {
    archivesName = "${project.archives_base_name}-fabric"
}

// Compile the shared :common sources into this jar against Loom's Minecraft view. The standalone
// :common module additionally compiles them against vanilla NeoForm as a platform-agnostic purity
// check. Assets/data stay in shared-resources.
sourceSets.main.java.srcDir "${rootProject.projectDir}/common/src/main/java"

dependencies {
    minecraft "com.mojang:minecraft:${minecraft_version}"
    // No `mappings` line — Minecraft 26.1 is deobfuscated and ships Mojang's official names.

    implementation "net.fabricmc:fabric-loader:${loader_version}"
    implementation "net.fabricmc.fabric-api:fabric-api:${fabric_version}"
}

loom {
    mods {
        "lonsdaleite" {
            sourceSet sourceSets.main
        }
    }

    runs {
        client { runDir = "../run" }
        server { runDir = "../run" }
    }
}

processResources {
    inputs.property "version", project.version
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    from('../shared-resources') {
        exclude '**/*.java'
    }

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 25
}

java {
    withSourcesJar()
}

jar {
    from("../LICENSE") {
        rename { "${it}_${base.archivesName.get()}" }
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
}
